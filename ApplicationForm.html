<nav class="w3-white">
<div class="w3-bar w3-center w3-padding">

<div class="w3-content w3-padding-32" style="max-width:900px">

<header class="w3-center">
<h1 class="w3-xxlarge">Application Form</h1>
<p>Please complete the form below to apply for a position at our company.</p>
</header>

<div class="w3-card w3-white w3-padding-large">

<form action="#" method="post">

<h3>Personal Information</h3>

<label>Full Name</label>
<input class="w3-input w3-border w3-margin-bottom" type="text" required>

<label>Age</label>
<input class="w3-input w3-border w3-margin-bottom" type="number" min="18" required>

<label>Email Address</label>
<input class="w3-input w3-border w3-margin-bottom" type="email" required>

<label>Phone Number</label>
<input class="w3-input w3-border w3-margin-bottom" type="tel">

<h3>Pupils Information</h3>

<label>Which role are you applying for?</label>
<select class="w3-select w3-border w3-margin-bottom" required>
<option value="" disabled selected>Select a role</option>
<option>Junior Web Developer</option>
<option>Front-End Developer</option>
</select>

<label>Do you have any relevant experience?</label>
<textarea class="w3-input w3-border w3-margin-bottom" rows="4" placeholder="Describe any experience you may have..."></textarea>

<label>Availability</label>
<select class="w3-select w3-border w3-margin-bottom">
<option>Weekends</option>
<option>Weekdays</option>
<option>Both</option>
<option>Part-Time</option>
</select>

<label>Any specific reason as to why you would want to work with us?</label>
<textarea class="w3-input w3-border w3-margin-bottom" rows="4"></textarea>

<br><br>

<button class="w3-button w3-red w3-padding-large" type="submit">
Submit Application
</button>

<button class="w3-button w3-grey w3-padding-large" type="reset">
Clear Form
</button>

</form>

</div>

</div>

<footer class="w3-center w3-padding w3-white">
© S Gheuca 2026
</footer>

</body>
</html>
